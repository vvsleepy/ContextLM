name: Keep Backend Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute inactivity sleep
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allows you to run it manually from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          curl -sS "${{ secrets.BACKEND_URL }}/api/health" || echo "Ping failed, but workflow will continue"
